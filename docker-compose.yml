version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gravit
      POSTGRES_PASSWORD: gravit
      POSTGRES_DB: gravit

  node:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      - GRAVIT_ETA=0.2
      - GRAVIT_GAMMA=1.5
      - GRAVIT_EPSILON=0.1
      - GRAVIT_NODE_ID=${NODE_ID:-node-1}

