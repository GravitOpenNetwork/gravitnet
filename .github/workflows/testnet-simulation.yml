name: VCP Testnet (local 50-node cluster)
on: [push, workflow_dispatch]

jobs:
  local-testnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build EES node image
        run: docker compose build

      - name: Start 50-node testnet
        run: |
          for i in {1..50}; do
            PORT=$((8000 + i - 1))
            docker compose run -d \
              --name "gravit-node-$i" \
              --publish "$PORT:8000" \
              --env NODE_ID="node-$i" \
              --env GRAVIT_ETA=0.2 \
              --env GRAVIT_GAMMA=1.5 \
              --env GRAVIT_EPSILON=0.1 \
              node
          done

      - name: Wait for nodes to be ready
        run: sleep 5

      - name: Get claim_id from node-1
        id: claim
        run: |
          RESP=$(curl -s -X POST http://localhost:8000/v1/claim \
            -H "Content-Type: application/json" \
            -d '{"content":"test claim","provenance":[{"type":"url","src":"https://example.com"}],"method":"grover"}')
          CLAIM_ID=$(echo $RESP | jq -r '.claim_id')
          echo "CLAIM_ID=$CLAIM_ID" >> $GITHUB_ENV

      - name: Verify claim on node-2
        run: |
          curl -s http://localhost:8001/v1/claim/${{ env.CLAIM_ID }} | jq '.'

      - name: Verify action on node-3 (should reject, confidence < 0.7)
        run: |
          curl -s -X POST http://localhost:8002/v1/action/verify \
            -H "Content-Type: application/json" \
            -d '{"name":"test","params":{},"basis":["${{ env.CLAIM_ID }}"],"stake":100,"proposed_by":"did:test"}' \
            | jq '.'

      - name: Get trace
        run: |
          TRACE_ID=$(curl -s http://localhost:8001/v1/claim/${{ env.CLAIM_ID }} | jq -r '.claim.trace[0]')
          curl -s http://localhost:8002/v1/trace/$TRACE_ID | jq '.'

      - name: Print node status
        run: |
          echo "=== Node 1 /.well-known/vcp ==="
          curl -s http://localhost:8000/.well-known/vcp | jq '.'
          echo "=== Node 50 /.well-known/vcp ==="
          curl -s http://localhost:8049/.well-known/vcp | jq '.'
