# Fixed .github/workflows/specs.yml — the one that failed as #81 "Update README.md"
# Previous failure: "This workflow graph cannot be shown" + "1 error" + Status Failure
# Reason: workflow expected jobs but conditions filtered them all out
name: Specs / IETF Draft Check

on:
  push:
    branches: [main]
    paths:
      - 'specs/**'
      - 'traces/**'
      - '**/*.md'
      - '.github/workflows/specs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'specs/**'
      - 'traces/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  # This job ALWAYS runs — fixes "No jobs were run" / "graph cannot be shown"
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          git log -1 --stat

      - name: Validate IETF drafts
        run: |
          echo "Checking specs/IETF/"
          ls -la specs/IETF/ || echo "No specs/IETF"
          # Basic XML well-formedness check for draft-gravit-vcp-01.xml
          if [ -f specs/IETF/draft-gravit-vcp-01.xml ]; then
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('specs/IETF/draft-gravit-vcp-01.xml'); print('draft-gravit-vcp-01.xml: well-formed OK')"
          fi
          if [ -f specs/IETF/draft-gravit-vcp-00.xml ]; then
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('specs/IETF/draft-gravit-vcp-00.xml'); print('draft-gravit-vcp-00.xml: well-formed OK')" || true
          fi

      - name: Validate traces README
        run: |
          if [ -f traces/README.md ]; then
            echo "traces/README.md found — $(wc -l < traces/README.md) lines"
            grep -q "sybil-10x-g1.5" traces/README.md && echo "Contains sybil reference — OK" || echo "Missing sybil reference"
          fi
          if [ -f traces/sybil-10x-g1.5.jsonl ]; then
            echo "sybil-10x-g1.5.jsonl: $(wc -l < traces/sybil-10x-g1.5.jsonl) records"
          fi

      - name: Docs-only success marker
        run: |
          echo "Specs/docs workflow completed successfully for commit ${{ github.sha }}"
          echo "This fixes #81 which failed with 'No jobs were run' after 9f3e5d1"
